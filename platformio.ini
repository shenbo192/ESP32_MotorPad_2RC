[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
upload_speed = 115200

; ★★★ 关键：使用本地Bluepad32框架（包含HID Host支持）★★★
platform_packages =
  framework-arduinoespressif32@file://pio_bp32_framework

; 蓝牙配置
board_build.partitions = min_spiffs.csv
build_flags =
  -DBOARD_HAS_PSRAM=0
  -DCORE_DEBUG_LEVEL=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DCONFIG_BT_NIMBLE_ENABLED=0

lib_deps =
  madhephaestus/ESP32Servo@^1.1.1

; 调试配置
debug_tool = esp-prog
debug_init_break = tbreak setup

monitor_speed = 115200
monitor_port = COM3